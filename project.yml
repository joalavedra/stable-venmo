name: OpenfortVenmo
options:
  bundleIdPrefix: io.openfort
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  OpenfortSwift:
    url: https://github.com/openfort-xyz/swift-sdk.git
    exactVersion: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Ad-hoc sign for the simulator so the app gets keychain access (the SDK stores session
    # state in the Keychain; an unsigned build returns errSecMissingEntitlement -34018).
    CODE_SIGNING_ALLOWED: "YES"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  OpenfortVenmo:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.openfort.venmodemo
        CODE_SIGN_ENTITLEMENTS: App/OpenfortVenmo.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Venmo
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: OpenfortSwift
        product: OpenfortSwift
